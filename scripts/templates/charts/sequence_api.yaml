# API 交互时序图模板
# 适用于描述前后端 API 调用交互过程

id: "api_interaction"
name: "API 交互时序图"
description: "适用于描述前后端 API 调用的完整交互过程"

# 模板变量定义
variables:
  - name: "participants"
    description: "参与者列表"
    type: "list"
    default:
      - {id: "U", name: "用户", type: "actor"}
      - {id: "F", name: "前端", type: "participant"}
      - {id: "A", name: "API网关", type: "participant"}
      - {id: "S", name: "业务服务", type: "participant"}
      - {id: "D", name: "数据库", type: "participant"}
  - name: "messages"
    description: "消息序列"
    type: "list"
    default: []

# Mermaid 代码模板
mermaid_template: |
  %% {{chart_id}} {{chart_name}}
  %% 自动生成于 {{timestamp}}
  sequenceDiagram
      {% for p in participants %}
      {% if p.type == 'actor' %}
      actor {{p.id}} as {{p.name}}
      {% else %}
      participant {{p.id}} as {{p.name}}
      {% endif %}
      {% endfor %}

      {% for msg in messages %}
      {% if msg.type == 'sync' %}
      {{msg.from}}->>{{msg.to}}: {{msg.content}}
      {% elif msg.type == 'async' %}
      {{msg.from}}->>+{{msg.to}}: {{msg.content}}
      {% elif msg.type == 'return' %}
      {{msg.from}}-->>{{msg.to}}: {{msg.content}}
      {% elif msg.type == 'self' %}
      {{msg.from}}->>{{msg.from}}: {{msg.content}}
      {% endif %}
      {% endfor %}

# 默认消息序列（当未提取到具体消息时使用）
default_messages:
  - {from: "U", to: "F", type: "sync", content: "发起请求"}
  - {from: "F", to: "A", type: "sync", content: "HTTP请求"}
  - {from: "A", to: "A", type: "self", content: "认证校验"}
  - {from: "A", to: "S", type: "sync", content: "调用服务"}
  - {from: "S", to: "D", type: "sync", content: "数据查询"}
  - {from: "D", to: "S", type: "return", content: "返回数据"}
  - {from: "S", to: "A", type: "return", content: "业务响应"}
  - {from: "A", to: "F", type: "return", content: "HTTP响应"}
  - {from: "F", to: "U", type: "return", content: "展示结果"}

# 关键词匹配规则
keywords:
  - "API"
  - "接口"
  - "调用"
  - "交互"
  - "请求"
  - "响应"
  - "时序"